<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Pages Custom Domain Fehlermeldung</title>
  <desc id="desc">Visualisierte Fehlermeldung: The custom domain claudiu.info is already taken by another repository in your account.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16284a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="230" cy="120" r="180" fill="#1d4658" opacity="0.55"/>
  <rect x="120" y="90" width="1040" height="540" rx="28" fill="#0f172a" stroke="#334155" filter="url(#shadow)"/>
  <rect x="120" y="90" width="1040" height="70" rx="28" fill="#111827"/>
  <circle cx="164" cy="125" r="10" fill="#ef4444"/>
  <circle cx="196" cy="125" r="10" fill="#f59e0b"/>
  <circle cx="228" cy="125" r="10" fill="#22c55e"/>
  <text x="270" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#e5e7eb">GitHub Pages · Custom domain</text>
  <text x="170" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#eef6ff">Custom domain konnte nicht übernommen werden</text>
  <rect x="170" y="270" width="940" height="170" rx="16" fill="#3b1d1d" stroke="#f87171" opacity="0.95"/>
  <text x="200" y="318" font-family="Consolas, Menlo, monospace" font-size="22" fill="#fecaca">
    <tspan x="200" dy="0">The custom domain `claudiu.info` is already taken by another</tspan>
    <tspan x="200" dy="34">repository in your account.</tspan>
    <tspan x="200" dy="44">Remove this domain from the other repository before using it here.</tspan>
  </text>
  <text x="170" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#64f0c8">Interpretation</text>
  <text x="170" y="545" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#a9bad0">
    <tspan x="170" dy="0">Die Domain war noch bei einem anderen Repository im selben GitHub-Account hinterlegt.</tspan>
    <tspan x="170" dy="34">Lösung: Domain dort entfernen, danach im richtigen Repository erneut als Custom Domain setzen.</tspan>
  </text>
</svg>
